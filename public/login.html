<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ingresar a Ourus">
    <title>Ingresar - Ourus</title>
    
    <!-- CSS System -->
    <link rel="stylesheet" href="../src/styles/variables.css">
    <link rel="stylesheet" href="../src/styles/global.css">
    <link rel="stylesheet" href="../src/styles/components.css">
    <link rel="stylesheet" href="../src/styles/responsive.css">
    <link rel="stylesheet" href="../src/styles/animations.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-4);
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
        }

        .auth-card {
            background: var(--color-white);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-2xl);
            padding: var(--spacing-8);
            animation: slideInUp var(--transition-slow);
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--spacing-8);
        }

        .auth-logo {
            font-size: 3rem;
            margin-bottom: var(--spacing-3);
        }

        .auth-header h1 {
            font-size: var(--font-size-2xl);
            margin-bottom: var(--spacing-2);
        }

        .auth-header p {
            color: var(--color-gray-600);
            margin: 0;
        }

        .form-group {
            margin-bottom: var(--spacing-6);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--spacing-2);
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-900);
        }

        .form-group input {
            width: 100%;
            padding: var(--spacing-3) var(--spacing-4);
            border: var(--border-width-1) solid var(--color-gray-300);
            border-radius: var(--border-radius-md);
            font-size: var(--font-size-base);
            transition: all var(--transition-base);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-6);
            font-size: var(--font-size-sm);
        }

        .form-options input {
            margin-right: var(--spacing-2);
            cursor: pointer;
        }

        .form-options a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .form-options a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: var(--spacing-4);
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: var(--color-white);
            border: none;
            border-radius: var(--border-radius-md);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            transition: all var(--transition-base);
            margin-bottom: var(--spacing-6);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: var(--spacing-6) 0;
            color: var(--color-gray-400);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-gray-300);
        }

        .divider span {
            padding: 0 var(--spacing-3);
            font-size: var(--font-size-sm);
        }

        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-4);
            margin-bottom: var(--spacing-6);
        }

        .social-btn {
            padding: var(--spacing-3) var(--spacing-4);
            border: var(--border-width-1) solid var(--color-gray-300);
            background: var(--color-white);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            font-size: var(--font-size-lg);
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-2);
            font-weight: var(--font-weight-medium);
        }

        .social-btn:hover {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
        }

        .auth-footer {
            text-align: center;
            color: var(--color-gray-600);
            font-size: var(--font-size-sm);
        }

        .auth-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: var(--font-weight-semibold);
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .auth-card {
                padding: var(--spacing-6);
            }

            .social-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">🛍️</div>
                <h1>Ourus</h1>
                <p>Inicia sesión en tu cuenta</p>
            </div>

            <form>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" name="remember"> Recuérdame
                    </label>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-submit">Ingresar</button>
            </form>

            <div class="divider">
                <span>O continúa con</span>
            </div>

            <div class="social-buttons">
                <button type="button" class="social-btn">
                    🍎 Apple
                </button>
                <button type="button" class="social-btn">
                    🔵 Google
                </button>
            </div>

            <div class="auth-footer">
                ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('¡Bienvenido a Ourus! En producción aquí se validaría la cuenta.');
        });
    </script>
</body>
</html>
